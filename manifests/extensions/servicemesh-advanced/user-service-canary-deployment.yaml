apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-canary
  namespace: apps
  labels:
    app.kubernetes.io/name: user-service-canary
    app.kubernetes.io/part-of: kind-study
    app.kubernetes.io/version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service-canary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service-canary
        app.kubernetes.io/part-of: kind-study
        app.kubernetes.io/version: canary
    spec:
      containers:
        - name: user-service-canary
          image: ghcr.io/stefanprodan/podinfo:6.7.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
          env:
            - name: PODINFO_UI_MESSAGE
              value: user-service canary is running
            - name: PODINFO_COLOR
              value: "#f97316"
            - name: PODINFO_PORT
              value: "9898"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
