apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-content
  namespace: apps
data:
  index.html: |
    <!doctype html>
    <html lang="ja">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>kind-study web app</title>
        <style>
          body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, sans-serif;
            background: linear-gradient(135deg, #f8fafc, #dbeafe);
            color: #0f172a;
          }
          main {
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 24px 72px;
          }
          h1 {
            font-size: 40px;
            margin-bottom: 8px;
          }
          p {
            line-height: 1.7;
          }
          .grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            margin-top: 24px;
          }
          .card {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
            padding: 20px;
          }
          pre {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 14px;
            overflow: auto;
            padding: 16px;
            min-height: 120px;
          }
        </style>
      </head>
      <body>
        <main>
          <h1>kind-study web app</h1>
          <p>Ingress, Service, Deployment, PostgreSQL, Monitoring, GitOps を学ぶためのフロントエンドです。</p>
          <div class="grid">
            <section class="card">
              <h2>user-service</h2>
              <pre id="users">loading...</pre>
            </section>
            <section class="card">
              <h2>item-service</h2>
              <pre id="items">loading...</pre>
            </section>
          </div>
        </main>
        <script>
          const targets = [
            ["/api/users", document.getElementById("users")],
            ["/api/items", document.getElementById("items")]
          ];
          targets.forEach(async ([path, element]) => {
            try {
              const response = await fetch(path);
              const text = await response.text();
              element.textContent = text;
            } catch (error) {
              element.textContent = String(error);
            }
          });
        </script>
      </body>
    </html>
